<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Results Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    .drop-active { border-color: #3b82f6 !important; background-color: rgba(59,130,246,0.05) !important; }
    .group-header { user-select: none; }
    .group-header:hover { background-color: rgba(255,255,255,0.03); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="border-b border-gray-800 px-6 py-4">
    <h1 class="text-2xl font-bold">Lab Results Viewer</h1>
    <p class="text-sm text-gray-400">Upload your XML or CSV lab results to visualise trends</p>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col gap-6">

    <!-- Upload Area -->
    <div id="uploadArea"
         class="border-2 border-dashed border-gray-700 rounded-xl p-12 text-center cursor-pointer hover:border-gray-500 transition-colors">
      <input type="file" id="fileInput" accept=".xml,.csv" class="hidden">
      <div class="text-5xl mb-3">📂</div>
      <p class="text-lg font-medium">Drop your XML or CSV file here</p>
      <p class="text-sm text-gray-400 mt-1">or click to browse</p>
      <div id="uploadStatus" class="mt-3 text-sm hidden"></div>
    </div>

    <!-- Main Content (hidden until file loaded) -->
    <div id="mainContent" class="hidden">

      <div class="flex flex-wrap gap-4 items-start">

        <!-- Test Selector (by Test Group) -->
        <div class="w-80 shrink-0">
          <div class="bg-gray-900 rounded-xl border border-gray-800 p-4 max-h-[600px] overflow-y-auto">
            <div class="flex items-center justify-between mb-3">
              <h2 class="font-semibold text-lg">Select Tests</h2>
              <div class="flex gap-2">
                <button onclick="selectAll()" class="text-xs px-2 py-1 rounded bg-blue-600 hover:bg-blue-500">All</button>
                <button onclick="selectNone()" class="text-xs px-2 py-1 rounded bg-gray-700 hover:bg-gray-600">None</button>
              </div>
            </div>
            <div id="testSelector"></div>
          </div>

          <!-- Axis Controls -->
          <div class="bg-gray-900 rounded-xl border border-gray-800 p-4 mt-4">
            <h2 class="font-semibold text-sm mb-3">Y-Axis Units</h2>
            <div class="space-y-3">
              <div>
                <label class="text-xs text-gray-400 block mb-1">Left Axis</label>
                <select id="leftAxis" onchange="updateChart()"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm"></select>
              </div>
              <div>
                <label class="text-xs text-gray-400 block mb-1">Right Axis</label>
                <select id="rightAxis" onchange="updateChart()"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm"></select>
              </div>
              <button onclick="swapAxes()" class="w-full text-xs px-3 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700">
                ⇄ Swap Axes
              </button>
            </div>
          </div>
        </div>

        <!-- Chart + Legend -->
        <div class="flex-1 min-w-0">
          <!-- Legend -->
          <div id="chartLegend" class="flex flex-wrap gap-3 mb-3 text-xs"></div>
          <!-- Chart -->
          <div class="bg-gray-900 rounded-xl border border-gray-800 p-4">
            <canvas id="labChart" height="450"></canvas>
          </div>
        </div>

      </div>
    </div>
  </main>

<script>
// ─── State ──────────────────────────────────────────────────────────
let rawResults = [];    // flat array from backend
let chart = null;

const COLORS = [
  '#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7','#ec4899',
  '#06b6d4','#84cc16','#f97316','#6366f1','#14b8a6','#e11d48',
  '#8b5cf6','#0ea5e9','#d946ef','#facc15','#10b981','#f43f5e',
];

// ─── File Upload ────────────────────────────────────────────────────
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const uploadStatus = document.getElementById('uploadStatus');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drop-active'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drop-active'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drop-active');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  uploadStatus.classList.remove('hidden');
  uploadStatus.className = 'mt-3 text-sm text-blue-400';
  uploadStatus.textContent = `Parsing ${file.name}...`;

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch('/upload', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    rawResults = data.results;
    uploadStatus.className = 'mt-3 text-sm text-green-400';
    uploadStatus.textContent = `✓ Loaded ${rawResults.length} results from ${file.name}`;

    buildUI();
    document.getElementById('mainContent').classList.remove('hidden');
  } catch (err) {
    uploadStatus.className = 'mt-3 text-sm text-red-400';
    uploadStatus.textContent = `✗ ${err.message}`;
  }
}

// ─── Build Grouped Test Selector ────────────────────────────────────

function getTestGroups() {
  // Build: { groupName: { testName: { unit, readings: [...], refLow, refHigh } } }
  const groups = {};
  for (const r of rawResults) {
    if (!groups[r.testGroup]) groups[r.testGroup] = {};
    if (!groups[r.testGroup][r.testName]) {
      groups[r.testGroup][r.testName] = { unit: r.unit, readings: [], refLow: r.refLow, refHigh: r.refHigh };
    }
    groups[r.testGroup][r.testName].readings.push({ date: r.date, value: r.value });
  }
  return groups;
}

function buildUI() {
  const groups = getTestGroups();
  const selector = document.getElementById('testSelector');
  selector.innerHTML = '';

  const sortedGroups = Object.keys(groups).sort();

  sortedGroups.forEach(groupName => {
    const tests = groups[groupName];
    const testNames = Object.keys(tests).sort();
    const safeGroup = groupName.replace(/[^a-zA-Z0-9]/g, '_');

    // Group header with collapse toggle
    const groupDiv = document.createElement('div');
    groupDiv.className = 'mb-3';
    groupDiv.innerHTML = `
      <div class="group-header flex items-center justify-between py-1.5 px-2 rounded-lg cursor-pointer"
           onclick="toggleGroupCollapse('${safeGroup}')">
        <div class="flex items-center gap-2">
          <span id="arrow_${safeGroup}" class="text-gray-500 text-xs transition-transform">▶</span>
          <span class="text-sm font-semibold text-blue-400">${groupName}</span>
          <span class="text-xs text-gray-500">(${testNames.length})</span>
        </div>
        <div class="flex gap-1" onclick="event.stopPropagation()">
          <button onclick="toggleGroupTests('${safeGroup}', true)" class="text-[10px] px-1.5 py-0.5 rounded bg-gray-800 hover:bg-gray-700 text-gray-400">all</button>
          <button onclick="toggleGroupTests('${safeGroup}', false)" class="text-[10px] px-1.5 py-0.5 rounded bg-gray-800 hover:bg-gray-700 text-gray-400">none</button>
        </div>
      </div>
      <div id="group_${safeGroup}" class="hidden pl-6 mt-1 space-y-0.5">
        ${testNames.map(tn => {
          const info = tests[tn];
          const id = `chk_${safeGroup}_${tn.replace(/[^a-zA-Z0-9]/g, '_')}`;
          return `
            <label class="flex items-center gap-2 py-0.5 px-1 rounded hover:bg-gray-800 cursor-pointer text-sm">
              <input type="checkbox" id="${id}"
                     data-group="${groupName}" data-test="${tn}" data-unit="${info.unit}"
                     data-reflow="${info.refLow ?? ''}" data-refhigh="${info.refHigh ?? ''}"
                     onchange="onTestToggle()" class="accent-blue-500 rounded">
              <span>${tn}</span>
              <span class="text-gray-500 text-xs ml-auto">${info.unit}</span>
            </label>
          `;
        }).join('')}
      </div>
    `;
    selector.appendChild(groupDiv);
  });

  // Build axis unit dropdowns from all unique units
  const allUnits = [...new Set(rawResults.map(r => r.unit))].sort();
  const leftSel = document.getElementById('leftAxis');
  const rightSel = document.getElementById('rightAxis');
  leftSel.innerHTML = '<option value="">— none —</option>';
  rightSel.innerHTML = '<option value="">— none —</option>';
  allUnits.forEach(u => {
    leftSel.add(new Option(u, u));
    rightSel.add(new Option(u, u));
  });
}

function toggleGroupCollapse(safeGroup) {
  const el = document.getElementById(`group_${safeGroup}`);
  const arrow = document.getElementById(`arrow_${safeGroup}`);
  if (el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    arrow.style.transform = 'rotate(90deg)';
  } else {
    el.classList.add('hidden');
    arrow.style.transform = '';
  }
}

function toggleGroupTests(safeGroup, checked) {
  // Also expand the group when selecting
  const el = document.getElementById(`group_${safeGroup}`);
  const arrow = document.getElementById(`arrow_${safeGroup}`);
  if (checked && el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    arrow.style.transform = 'rotate(90deg)';
  }

  el.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = checked);
  onTestToggle();
}

function selectAll() {
  document.querySelectorAll('#testSelector input[type=checkbox]').forEach(cb => cb.checked = true);
  // Expand all groups
  document.querySelectorAll('#testSelector [id^=group_]').forEach(el => el.classList.remove('hidden'));
  document.querySelectorAll('#testSelector [id^=arrow_]').forEach(el => el.style.transform = 'rotate(90deg)');
  onTestToggle();
}

function selectNone() {
  document.querySelectorAll('#testSelector input[type=checkbox]').forEach(cb => cb.checked = false);
  onTestToggle();
}

function swapAxes() {
  const l = document.getElementById('leftAxis');
  const r = document.getElementById('rightAxis');
  const tmp = l.value;
  l.value = r.value;
  r.value = tmp;
  updateChart();
}

// ─── Auto-detect best axis units from selection ─────────────────────

function onTestToggle() {
  // Get unique units from selected tests
  const selected = getSelectedTests();
  const units = [...new Set(selected.map(s => s.unit))];

  // Auto-set axis dropdowns to the first 2 unique units
  const leftSel = document.getElementById('leftAxis');
  const rightSel = document.getElementById('rightAxis');

  if (units.length >= 1) leftSel.value = units[0];
  if (units.length >= 2) rightSel.value = units[1];
  else rightSel.value = '';

  updateChart();
}

function getSelectedTests() {
  const selected = [];
  document.querySelectorAll('#testSelector input[type=checkbox]:checked').forEach(cb => {
    selected.push({
      group: cb.dataset.group,
      test: cb.dataset.test,
      unit: cb.dataset.unit,
      refLow: cb.dataset.reflow ? parseFloat(cb.dataset.reflow) : null,
      refHigh: cb.dataset.refhigh ? parseFloat(cb.dataset.refhigh) : null,
    });
  });
  return selected;
}

// ─── Chart Rendering ────────────────────────────────────────────────

function updateChart() {
  const leftUnit = document.getElementById('leftAxis').value;
  const rightUnit = document.getElementById('rightAxis').value;
  const selected = getSelectedTests();

  // Filter to tests matching either axis unit
  const visible = selected.filter(s =>
    s.unit === leftUnit || s.unit === rightUnit
  );

  // Build lookup: testName -> readings
  const groups = getTestGroups();
  const testReadings = {};
  for (const g of Object.values(groups)) {
    for (const [tn, info] of Object.entries(g)) {
      testReadings[tn] = info.readings;
    }
  }

  // Build datasets
  const datasets = [];
  const annotations = {};
  let colorIdx = 0;

  visible.forEach(({ test, unit, refLow, refHigh }) => {
    const readings = testReadings[test] || [];
    if (!readings.length) return;

    const color = COLORS[colorIdx % COLORS.length];
    const isRight = unit === rightUnit && leftUnit !== rightUnit;

    datasets.push({
      label: test,
      data: readings.map(r => ({ x: r.date, y: r.value })),
      borderColor: color,
      backgroundColor: color + '33',
      borderWidth: 2,
      pointRadius: 4,
      pointHoverRadius: 6,
      tension: 0.3,
      yAxisID: isRight ? 'yRight' : 'yLeft',
    });

    // Reference range band
    if (refLow != null && refHigh != null) {
      annotations[`ref_${test.replace(/\s/g, '_')}`] = {
        type: 'box',
        yMin: refLow,
        yMax: refHigh,
        yScaleID: isRight ? 'yRight' : 'yLeft',
        backgroundColor: color + '0D',
        borderColor: color + '30',
        borderWidth: 1,
      };
    }

    colorIdx++;
  });

  // Update legend
  const legendDiv = document.getElementById('chartLegend');
  legendDiv.innerHTML = datasets.map(ds => {
    const side = ds.yAxisID === 'yRight' ? 'R' : 'L';
    return `<span class="flex items-center gap-1.5 bg-gray-900 border border-gray-800 rounded-full px-3 py-1">
      <span class="w-2.5 h-2.5 rounded-full inline-block" style="background:${ds.borderColor}"></span>
      ${ds.label}
      <span class="text-gray-500">${side}</span>
    </span>`;
  }).join('');

  const hasLeft = datasets.some(d => d.yAxisID === 'yLeft');
  const hasRight = datasets.some(d => d.yAxisID === 'yRight');

  // Destroy old chart
  if (chart) chart.destroy();

  if (!datasets.length) {
    const ctx = document.getElementById('labChart').getContext('2d');
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    return;
  }

  const ctx = document.getElementById('labChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: false },
      plugins: {
        legend: { display: false },
        annotation: { annotations },
        tooltip: {
          callbacks: {
            title: items => items[0]?.raw?.x || '',
            label: item => {
              const ds = item.dataset;
              const unit = ds.yAxisID === 'yRight' ? rightUnit : leftUnit;
              return `${ds.label}: ${item.parsed.y} ${unit}`;
            }
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'month', tooltipFormat: 'dd MMM yyyy' },
          grid: { color: '#1f2937' },
          ticks: { color: '#9ca3af' },
        },
        yLeft: {
          type: 'linear',
          position: 'left',
          display: hasLeft,
          title: { display: hasLeft, text: leftUnit, color: '#60a5fa', font: { size: 14, weight: 'bold' } },
          grid: { color: '#1f2937' },
          ticks: { color: '#60a5fa' },
        },
        yRight: {
          type: 'linear',
          position: 'right',
          display: hasRight && leftUnit !== rightUnit,
          title: { display: hasRight, text: rightUnit, color: '#f87171', font: { size: 14, weight: 'bold' } },
          grid: { drawOnChartArea: false },
          ticks: { color: '#f87171' },
        }
      }
    }
  });
}
</script>
</body>
</html>
